name: Build Binaries

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Upgrade mcp-go to latest
        run: |
          go get github.com/mark3labs/mcp-go@latest
          go mod tidy

      - name: Build macOS Apple Silicon
        run: GOOS=darwin GOARCH=arm64 go build -o mcp-transactions-darwin-arm64 .

      - name: Build Linux amd64 (WSL)
        run: GOOS=linux GOARCH=amd64 go build -o mcp-transactions-linux-amd64 .

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: mcp-transactions-binaries
          path: |
            mcp-transactions-darwin-arm64
            mcp-transactions-linux-amd64
          retention-days: 30

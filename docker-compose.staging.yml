name: mcp-api-staging

services:
  # Service key is staging-specific on purpose: Docker registers the service
  # key as a DNS alias on every attached network, and a bare "mcp-api" alias
  # would collide with the prod container if this stack ever joins a network
  # the prod stack is on — Docker DNS then round-robins between prod and
  # staging, silently splitting traffic across environments.
  mcp-api-staging:
    build: .
    container_name: ${SERVICE_CONTAINER_NAME}
    env_file:
      - stack.env
    ports:
      - "${SERVICE_PORT}:${SERVER_PORT}"
    restart: unless-stopped
    networks:
      - mcp-network
      # ai-internal-staging and transaction-service-v2-staging are both on
      # this network. Staging must NOT join prod networks (see alias note above).
      - staging_bff_back-end

networks:
  mcp-network:
    driver: bridge
  staging_bff_back-end:
    external: true

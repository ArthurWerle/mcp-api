name: mcp-api-staging

services:
  mcp-api:
    build: .
    container_name: ${SERVICE_CONTAINER_NAME}
    env_file:
      - stack.env
    ports:
      - "${SERVICE_PORT}:${SERVER_PORT}"
    restart: unless-stopped
    networks:
      - mcp-network
      - staging_transactions_transactions-network

networks:
  mcp-network:
    driver: bridge
  staging_transactions_transactions-network:
    external: true
